<div class="auth-guest trust">
  <header class="auth-guest__header">
    <div class="auth-guest__header-row">
      <app-auth-back-link [route]="['/gallery']" labelKey="AUTH.COMMON.BACK_TO_GALLERY" />
      <app-lang-switch></app-lang-switch>
    </div>
  </header>
  <div class="auth-guest__container">
    <div class="auth-guest__card">
      <div class="auth-guest__logo">
        <img src="/assets/images/logo.svg" alt="Itqan" width="50" height="50" />
      </div>
      <h1 class="auth-guest__title">{{ 'AUTH.TRUST.TITLE' | translate }}</h1>
      <p class="auth-guest__subtitle">{{ 'AUTH.TRUST.SUBTITLE' | translate }}</p>
      <div class="auth-guest__form">
        <button
          type="button"
          class="auth-guest__submit"
          [disabled]="isLoading"
          (click)="submit(true)"
        >
          {{ 'AUTH.TRUST.TRUST_BUTTON' | translate }}
        </button>
        <button
          type="button"
          class="auth-guest__submit auth-guest__submit--secondary"
          [disabled]="isLoading"
          (click)="submit(false)"
        >
          {{ 'AUTH.TRUST.DO_NOT_TRUST_BUTTON' | translate }}
        </button>
      </div>
    </div>
  </div>
</div>
