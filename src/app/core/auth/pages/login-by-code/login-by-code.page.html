<div class="auth-guest lbc">
  <header class="auth-guest__header">
    <div class="auth-guest__header-row">
      <app-auth-back-link [route]="['/account/login']" labelKey="AUTH.COMMON.BACK_TO_LOGIN" />
      <app-lang-switch></app-lang-switch>
    </div>
  </header>
  <div class="auth-guest__container">
    <div class="auth-guest__card">
      <div class="auth-guest__logo">
        <img src="/assets/images/logo.svg" alt="Itqan" width="50" height="50" />
      </div>
      <h1 class="auth-guest__title">{{ 'AUTH.LOGIN_BY_CODE.TITLE' | translate }}</h1>
      <p class="auth-guest__subtitle">{{ 'AUTH.LOGIN_BY_CODE.SUBTITLE' | translate }}</p>
      @if (errorMessage()) {
        <div class="auth-guest__alert" role="alert">{{ errorMessage() }}</div>
      }
      @if (infoMessage()) {
        <div class="auth-guest__info" role="status">{{ infoMessage() }}</div>
      }

      @if (step() === 'email') {
        <form [formGroup]="emailForm" (ngSubmit)="requestCode()" class="auth-guest__form">
          <div class="auth-guest__field">
            <label class="auth-guest__label" for="email">{{
              'AUTH.LOGIN.EMAIL_LABEL' | translate
            }}</label>
            <div class="auth-guest__input-wrapper">
              <input
                id="email"
                class="auth-guest__input"
                type="email"
                formControlName="email"
                autocomplete="email"
                [placeholder]="'FORMS.PLACEHOLDERS.EMAIL' | translate"
              />
              <ng-icon name="lucideMail" class="auth-guest__input-icon" aria-hidden="true" />
            </div>
          </div>
          <button
            type="submit"
            class="auth-guest__submit"
            [disabled]="emailForm.invalid || isLoading() || resendCooldownSeconds() > 0"
          >
            @if (isLoading()) {
              <span class="auth-guest__spinner" aria-hidden="true"></span>
            } @else {
              {{ 'AUTH.LOGIN_BY_CODE.SEND_CODE' | translate }}
            }
          </button>
        </form>
      } @else {
        <form [formGroup]="codeForm" (ngSubmit)="confirmCode()" class="auth-guest__form">
          <div class="auth-guest__field">
            <label class="auth-guest__label" for="code">{{
              'AUTH.LOGIN_BY_CODE.CODE_LABEL' | translate
            }}</label>
            <input
              id="code"
              class="auth-guest__input"
              type="text"
              formControlName="code"
              autocomplete="one-time-code"
              [placeholder]="'AUTH.LOGIN_BY_CODE.CODE_PLACEHOLDER' | translate"
            />
          </div>
          <button
            type="submit"
            class="auth-guest__submit"
            [disabled]="codeForm.invalid || isLoading()"
          >
            @if (isLoading()) {
              <span class="auth-guest__spinner" aria-hidden="true"></span>
            } @else {
              {{ 'AUTH.LOGIN_BY_CODE.SIGN_IN' | translate }}
            }
          </button>
          <button type="button" class="auth-guest__secondary" (click)="goToEmail()">
            {{ 'AUTH.LOGIN_BY_CODE.USE_OTHER_EMAIL' | translate }}
          </button>
        </form>
      }
    </div>
  </div>
</div>
