<div class="lbc">
  <header class="lbc__header">
    <div class="lbc__header-row">
      <a [routerLink]="['/login']" class="lbc__back">{{ 'AUTH.LOGIN_BY_CODE.BACK' | translate }}</a>
      <app-lang-switch></app-lang-switch>
    </div>
  </header>
  <div class="lbc__container">
    <div class="lbc__card">
      <div class="lbc__logo">
        <img src="/assets/images/logo.svg" alt="Itqan" width="50" height="50" />
      </div>
      <h1 class="lbc__title">{{ 'AUTH.LOGIN_BY_CODE.TITLE' | translate }}</h1>
      <p class="lbc__subtitle">{{ 'AUTH.LOGIN_BY_CODE.SUBTITLE' | translate }}</p>
      @if (errorMessage()) {
        <div class="lbc__alert">{{ errorMessage() }}</div>
      }

      @if (step() === 'email') {
        <form [formGroup]="emailForm" (ngSubmit)="requestCode()" class="lbc__form">
          <div class="lbc__field">
            <label class="lbc__label" for="email">{{ 'AUTH.LOGIN.EMAIL_LABEL' | translate }}</label>
            <input
              id="email"
              class="lbc__input"
              type="email"
              formControlName="email"
              autocomplete="email"
            />
          </div>
          <button type="submit" class="lbc__submit" [disabled]="emailForm.invalid || isLoading()">
            {{ 'AUTH.LOGIN_BY_CODE.SEND_CODE' | translate }}
          </button>
        </form>
      } @else {
        <form [formGroup]="codeForm" (ngSubmit)="confirmCode()" class="lbc__form">
          <div class="lbc__field">
            <label class="lbc__label" for="code">{{
              'AUTH.LOGIN_BY_CODE.CODE_LABEL' | translate
            }}</label>
            <input
              id="code"
              class="lbc__input"
              formControlName="code"
              autocomplete="one-time-code"
              [placeholder]="'AUTH.LOGIN_BY_CODE.CODE_PLACEHOLDER' | translate"
            />
          </div>
          <button type="submit" class="lbc__submit" [disabled]="codeForm.invalid || isLoading()">
            {{ 'AUTH.LOGIN_BY_CODE.SIGN_IN' | translate }}
          </button>
          <button type="button" class="lbc__secondary" (click)="goToEmail()">
            {{ 'AUTH.LOGIN_BY_CODE.USE_OTHER_EMAIL' | translate }}
          </button>
        </form>
      }
    </div>
  </div>
</div>
