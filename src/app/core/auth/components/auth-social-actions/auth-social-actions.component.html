<div class="auth-social">
  <div class="auth-social__divider" role="separator" aria-hidden="true">
    <span class="auth-social__divider-line"></span>
    <span class="auth-social__divider-label">{{ 'AUTH.LOGIN.OR_CONTINUE' | translate }}</span>
    <span class="auth-social__divider-line"></span>
  </div>

  <div class="auth-social__actions">
    <button
      type="button"
      class="auth-social__btn auth-social__btn--google"
      (click)="onGoogleClick()"
    >
      <svg class="auth-social__logo" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path
          fill="#4285F4"
          d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
        />
        <path
          fill="#34A853"
          d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
        />
        <path
          fill="#FBBC05"
          d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
        />
        <path
          fill="#EA4335"
          d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
        />
      </svg>
      <span>{{ googleLabelKey() | translate }}</span>
    </button>

    <button
      type="button"
      class="auth-social__btn auth-social__btn--github"
      (click)="onGitHubClick()"
    >
      <svg class="auth-social__logo" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path
          fill="currentColor"
          d="M12 0.5C5.65 0.5 0.5 5.65 0.5 12c0 5.09 3.29 9.4 7.86 10.93.58.11.79-.25.79-.56 0-.28-.01-1.02-.02-2-3.2.7-3.87-1.54-3.87-1.54-.53-1.35-1.29-1.71-1.29-1.71-1.06-.72.08-.71.08-.71 1.17.08 1.79 1.2 1.79 1.2 1.04 1.78 2.73 1.27 3.4.97.11-.76.41-1.27.74-1.56-2.55-.29-5.24-1.28-5.24-5.7 0-1.26.45-2.29 1.18-3.1-.12-.29-.51-1.47.11-3.06 0 0 .96-.31 3.15 1.18a10.9 10.9 0 0 1 2.87-.39c.97 0 1.95.13 2.87.39 2.19-1.49 3.15-1.18 3.15-1.18.62 1.59.23 2.77.11 3.06.73.81 1.18 1.84 1.18 3.1 0 4.43-2.7 5.41-5.27 5.69.42.36.8 1.08.8 2.18 0 1.57-.01 2.84-.01 3.22 0 .31.21.67.8.56A10.98 10.98 0 0 0 23.5 12C23.5 5.65 18.35 0.5 12 0.5Z"
        />
      </svg>
      <span>{{ githubLabelKey() | translate }}</span>
    </button>

    @if (passkeyAvailable()) {
      @if (flow() === 'login') {
        <button
          type="button"
          class="auth-social__btn auth-social__btn--passkey"
          [disabled]="passkeyLoading()"
          [attr.aria-label]="passkeyLabelKey() | translate"
          [attr.title]="passkeyLabelKey() | translate"
          (click)="onPasskeyClick()"
        >
          <ng-icon name="lucideFingerprint" class="auth-social__passkey-icon" aria-hidden="true" />
          <span>{{ passkeyLabelKey() | translate }}</span>
        </button>
      } @else {
        <a
          [routerLink]="['/passkey']"
          [queryParams]="passkeySignupQueryParams()"
          class="auth-social__btn auth-social__btn--passkey"
          [attr.aria-label]="passkeyLabelKey() | translate"
          [attr.title]="passkeyLabelKey() | translate"
        >
          <ng-icon name="lucideFingerprint" class="auth-social__passkey-icon" aria-hidden="true" />
          <span>{{ passkeyLabelKey() | translate }}</span>
        </a>
      }
    }
  </div>

  @if (flow() === 'login' && loginByCodeEnabled()) {
    <div class="auth-social__alt">
      <a [routerLink]="['/account/login/code']" class="auth-social__alt-link">
        {{ 'AUTH.LOGIN.LOGIN_WITH_CODE' | translate }}
      </a>
    </div>
  }
</div>
