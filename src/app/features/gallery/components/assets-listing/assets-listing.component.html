<div class="assets-listing">
  <app-filters
    class="assets-listing__filters"
    (searchQueryChange)="searchQueryChange($event)"
    (categoriesSelectionChange)="categoriesSelectionChange($event)"
    (licensesSelectionChange)="licensesSelectionChange($event)"
  />

  @if (errorState()) {
    <app-state-message
      class="assets-listing__state-wrapper"
      icon="lucideAlertCircle"
      iconVariant="error"
      [title]="'UI.SOMETHING_WENT_WRONG' | translate"
      [message]="'ERRORS.SERVER_ERROR' | translate"
      [actionLabel]="'UI.TRY_AGAIN' | translate"
      actionIcon="lucideRotateCw"
      actionType="primary"
      [actionLoading]="loading()"
      (actionClick)="getAssets()"
    />
  } @else {
    <div class="assets-listing__main">
      <div class="assets-listing__grid" [attr.aria-busy]="loading()">
        @if (!isServer && loading()) {
          @for (item of getSkeletonArray(); track item) {
            <app-asset-card-skeleton />
          }
        } @else if (!loading() && assets().length === 0) {
          <app-state-message
            class="assets-listing__state--in-grid"
            [icon]="hasActiveFilters() ? 'lucideSearch' : 'lucideFolderOpen'"
            iconVariant="default"
            [title]="
              hasActiveFilters()
                ? ('UI.NO_RESULTS_FOUND' | translate)
                : ('UI.NO_ASSETS_AVAILABLE' | translate)
            "
            [message]="
              hasActiveFilters()
                ? ('UI.NO_RESULTS_MESSAGE' | translate)
                : ('UI.NO_ASSETS_MESSAGE' | translate)
            "
          />
        } @else {
          @for (asset of assets(); track asset.id) {
            <app-asset-card [asset]="asset" />
          }
        }
      </div>
      @if (!loading() && total() > 0) {
        <div class="admin-pagination assets-listing__pagination">
          <nz-pagination
            [nzPageIndex]="page()"
            [nzTotal]="total()"
            [nzPageSize]="pageSize()"
            [nzShowSizeChanger]="true"
            [nzPageSizeOptions]="pageSizeOptions"
            nzShowQuickJumper
            (nzPageIndexChange)="onPageChange($event)"
            (nzPageSizeChange)="onPageSizeChange($event)"
          />
        </div>
      }
    </div>
  }
</div>
