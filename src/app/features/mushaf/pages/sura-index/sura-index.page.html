<section class="sura-index">
  <header class="sura-index__header">
    <h1 class="sura-index__title">{{ 'MUSHAF.TITLE' | translate }}</h1>
    <p class="sura-index__subtitle">{{ 'MUSHAF.INDEX_SUBTITLE' | translate }}</p>
    <div class="sura-index__toolbar">
      <app-mushaf-switcher />
    </div>
  </header>

  @if (loading()) {
    <div class="sura-index__grid">
      @for (placeholder of [].constructor(12); track $index) {
        <div class="sura-index__skeleton"></div>
      }
    </div>
  } @else if (errorState()) {
    <app-state-message
      icon="lucideAlertCircle"
      iconVariant="error"
      [title]="'UI.SOMETHING_WENT_WRONG' | translate"
      [message]="'ERRORS.SERVER_ERROR' | translate"
      [actionLabel]="'UI.TRY_AGAIN' | translate"
      actionIcon="lucideRotateCw"
      [actionLoading]="loading()"
      (actionClick)="retry()"
    />
  } @else {
    <div class="sura-index__grid">
      @for (surah of surahs(); track surah.number) {
        <app-sura-card [surah]="surah" [mushafSlug]="selected().slug" />
      }
    </div>
  }
</section>
