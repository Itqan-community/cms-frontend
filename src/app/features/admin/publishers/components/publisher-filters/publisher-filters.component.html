<div class="publisher-filters">
  <div class="publisher-filters__actions">
    <nz-input-group [nzPrefix]="searchIcon" class="publisher-filters__search">
      <input
        nz-input
        nzSize="default"
        type="text"
        [placeholder]="'ADMIN.PUBLISHERS.SEARCH_PLACEHOLDER' | translate"
        [ngModel]="searchValue"
        (ngModelChange)="onSearchChange($event)"
      />
    </nz-input-group>
    <ng-template #searchIcon><ng-icon name="lucideSearch" /></ng-template>

    <button
      nz-button
      nzType="default"
      nzSize="default"
      class="publisher-filters__filters-btn"
      (click)="openFiltersModal()"
    >
      <ng-icon name="lucideFilter" />
      <span>{{ 'ADMIN.COMMON.FILTERS' | translate }}</span>
    </button>
  </div>

  <nz-modal
    [(nzVisible)]="isFiltersModalOpen"
    (nzOnCancel)="closeFiltersModal()"
    [nzTitle]="'ADMIN.COMMON.FILTERS' | translate"
    [nzWidth]="'min(560px, 92vw)'"
    nzCentered
  >
    <ng-container *nzModalContent>
      <div class="publisher-filters__modal-grid">
        <nz-select
          class="publisher-filters__country"
          [nzPlaceHolder]="'ADMIN.PUBLISHERS.FILTERS.COUNTRY' | translate"
          nzSize="default"
          nzAllowClear
          nzShowSearch
          [ngModel]="selectedCountry"
          (ngModelChange)="onCountryChange($event)"
        >
          @for (country of countryOptions; track country) {
            <nz-option [nzValue]="country" [nzLabel]="countryLabel(country)"></nz-option>
          }
        </nz-select>

        <!-- is_verified filter (commented out — do not delete; use ADMIN.PUBLISHERS.FILTERS.VERIFICATION_STATUS, VERIFIED, NOT_VERIFIED)
        <nz-select
          class="publisher-filters__select"
          [nzPlaceHolder]="'ADMIN.PUBLISHERS.FILTERS.VERIFICATION_STATUS' | translate"
          nzSize="default"
          nzAllowClear
          [ngModel]="selectedVerified"
          (ngModelChange)="onVerifiedChange($event)"
        >
          <nz-option [nzLabel]="'ADMIN.PUBLISHERS.FILTERS.VERIFIED' | translate" [nzValue]="true"></nz-option>
          <nz-option [nzLabel]="'ADMIN.PUBLISHERS.FILTERS.NOT_VERIFIED' | translate" [nzValue]="false"></nz-option>
        </nz-select>
        -->
      </div>
    </ng-container>
    <ng-container *nzModalFooter>
      <div class="publisher-filters__modal-footer">
        <button nz-button nzType="default" nzSize="default" (click)="clearAdvancedFilters()">
          {{ 'ADMIN.COMMON.FILTER_CLEAR' | translate }}
        </button>
        <button nz-button nzType="primary" nzSize="default" (click)="closeFiltersModal()">
          {{ 'ADMIN.COMMON.FILTER_DONE' | translate }}
        </button>
      </div>
    </ng-container>
  </nz-modal>
</div>
