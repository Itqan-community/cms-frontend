<div class="admin-audio-stats">
  <div class="admin-audio-stats__cards">
    @if (loading()) {
      <div class="admin-audio-stats__card admin-audio-stats__card--skeleton">
        <div class="admin-audio-stats__icon-skeleton"></div>
        <div class="admin-audio-stats__value-skeleton"></div>
        <div class="admin-audio-stats__label-skeleton"></div>
      </div>
      <div class="admin-audio-stats__card admin-audio-stats__card--skeleton">
        <div class="admin-audio-stats__icon-skeleton"></div>
        <div class="admin-audio-stats__value-skeleton"></div>
        <div class="admin-audio-stats__label-skeleton"></div>
      </div>
      <div class="admin-audio-stats__card admin-audio-stats__card--skeleton">
        <div class="admin-audio-stats__icon-skeleton"></div>
        <div class="admin-audio-stats__value-skeleton"></div>
        <div class="admin-audio-stats__label-skeleton"></div>
      </div>
    } @else if (stats()) {
      <div class="admin-audio-stats__card">
        <div class="admin-audio-stats__icon admin-audio-stats__icon--riwayas">
          <i class="bx bx-book-open"></i>
        </div>
        <div class="admin-audio-stats__value">{{ stats()!.riwayas }}</div>
        <div class="admin-audio-stats__label">رواية متاحة</div>
      </div>

      <div class="admin-audio-stats__card">
        <div class="admin-audio-stats__icon admin-audio-stats__icon--recitations">
          <i class="bx bx-microphone"></i>
        </div>
        <div class="admin-audio-stats__value">{{ stats()!.recitations }}</div>
        <div class="admin-audio-stats__label">قراءة متاحة</div>
      </div>

      <div class="admin-audio-stats__card">
        <div class="admin-audio-stats__icon admin-audio-stats__icon--reciters">
          <i class="bx bx-user-voice"></i>
        </div>
        <div class="admin-audio-stats__value">{{ stats()!.reciters }}</div>
        <div class="admin-audio-stats__label">قارئ متاح</div>
      </div>
    }
  </div>
</div>
