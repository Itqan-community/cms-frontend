<div class="recitations-page">
  <div class="header-card">
    <h1>
      <i class="bx bx-volume-full"></i>
      {{ 'RECITATIONS.TITLE' | translate }}
    </h1>
    <p>{{ 'RECITATIONS.DESCRIPTION' | translate }}</p>
  </div>

  <div class="stats-grid">
    <div nz-row [nzGutter]="[24, 24]">
      <!-- Reciters Stats -->
      <div nz-col nzXs="24" nzMd="8">
        <nz-spin [nzSpinning]="statsLoading()">
          <app-stat-card
            [value]="stats()?.totalReciters || 0"
            [label]="'RECITATIONS.TOTAL_RECITERS'"
            icon="bx-user-voice"
            colorTheme="purple"
          ></app-stat-card>
        </nz-spin>
      </div>

      <!-- Riwayas Stats -->
      <div nz-col nzXs="24" nzMd="8">
        <nz-spin [nzSpinning]="statsLoading()">
          <app-stat-card
            [value]="stats()?.totalRiwayas || 0"
            [label]="'RECITATIONS.TOTAL_RIWAYAS'"
            icon="bx-bookmarks"
            colorTheme="green"
          ></app-stat-card>
        </nz-spin>
      </div>

      <!-- General Formats Data -->
      <div nz-col nzXs="24" nzMd="8">
        <nz-spin [nzSpinning]="statsLoading()">
          <app-stat-card
            [value]="stats()?.totalRecitations || 0"
            [label]="'RECITATIONS.TOTAL_RECITATIONS'"
            icon="bx-headphone"
            colorTheme="orange"
          ></app-stat-card>
        </nz-spin>
      </div>
    </div>
  </div>

  <div class="filters-bar">
    <button nz-button class="add-btn" (click)="onAddRecitation()">
      <i class="bx bx-plus"></i> {{ 'RECITATIONS.ADD_RECITER' | translate }}
    </button>

    <nz-select
      class="filter-select"
      [nzPlaceHolder]="'RECITATIONS.ALL_RIWAYAS' | translate"
      [ngModel]="selectedRiwayah()"
      (ngModelChange)="selectedRiwayah.set($event); onFilterChange()"
      nzAllowClear
    >
      <nz-option
        *ngFor="let option of riwayahOptions"
        [nzValue]="option"
        [nzLabel]="option"
      ></nz-option>
    </nz-select>

    <nz-select
      class="filter-select"
      [nzPlaceHolder]="'RECITATIONS.ALL_TYPES' | translate"
      [ngModel]="selectedType()"
      (ngModelChange)="selectedType.set($event); onFilterChange()"
      nzAllowClear
    >
      <nz-option
        *ngFor="let option of typeOptions"
        [nzValue]="option"
        [nzLabel]="option"
      ></nz-option>
    </nz-select>

    <nz-input-group [nzPrefix]="searchIcon" class="search-input">
      <input
        type="text"
        nz-input
        [placeholder]="'RECITATIONS.SEARCH_PLACEHOLDER' | translate"
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event); onFilterChange()"
      />
    </nz-input-group>
    <ng-template #searchIcon>
      <i class="bx bx-search"></i>
    </ng-template>
  </div>

  <div class="recitations-grid">
    <nz-spin [nzSpinning]="recitationsLoading()">
      <div nz-row [nzGutter]="[24, 24]">
        <div nz-col nzXs="24" nzSm="12" nzMd="8" *ngFor="let recitation of recitations()">
          <app-recitation-card
            [recitation]="recitation"
            (delete)="onDelete($event)"
            (playClick)="onPlayAudio($event)"
          ></app-recitation-card>
        </div>
      </div>

      <nz-empty
        *ngIf="recitations().length === 0 && !recitationsLoading()"
        [nzNotFoundContent]="'RECITATIONS.NO_RESULTS' | translate"
      ></nz-empty>
    </nz-spin>
  </div>

  <div class="pagination-container" *ngIf="totalCount() > pageSize">
    <nz-pagination
      [nzPageIndex]="currentPage()"
      [nzTotal]="totalCount()"
      [nzPageSize]="pageSize"
      (nzPageIndexChange)="onPageChange($event)"
    ></nz-pagination>
  </div>
</div>
