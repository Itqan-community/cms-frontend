<div class="qcms-page" dir="rtl">
  <!-- Green Header Bar -->
  <div class="qcms-header">
    <div class="qcms-header__inner">
      <div class="qcms-header__title">
        <span>📖</span>
        <span>نظام إدارة المحتوى القرآني</span>
      </div>
      <div class="qcms-header__actions">
        <a class="qcms-header__nav-link" [routerLink]="['/gallery']">مكتبة الأصول والموارد</a>
        <button class="qcms-header__refresh-btn" (click)="onRefresh()">
          <span>🔄</span>
          <span>تحديث البيانات</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Floating Tabs -->
  <div class="qcms-tabs-wrapper">
    <div class="qcms-tabs">
      @for (tab of tabs; track tab.id) {
        <a
          [routerLink]="['/quranic-cms', tab.path]"
          routerLinkActive="qcms-tabs__tab--active"
          [routerLinkActiveOptions]="
            ['audio', 'publishers', 'mushafs', 'software'].includes(tab.path)
              ? { exact: false }
              : { exact: true }
          "
          class="qcms-tabs__tab"
        >
          <span class="qcms-tabs__tab-emoji">{{ tab.emoji }}</span>
          <span class="qcms-tabs__tab-label">{{ tab.label }}</span>
        </a>
      }
    </div>
  </div>

  <!-- Tab Content -->
  <div class="qcms-content">
    <router-outlet />
  </div>
</div>
