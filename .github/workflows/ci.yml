name: CI

on:
  pull_request:
    branches: [staging, master]
  push:
    branches: [staging, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting
        run: npm run format:check

      - name: Build project
        run: npm run build -- --configuration=production

      - name: Run tests
        run: npm run test -- --browsers=ChromeHeadless --watch=false --code-coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v6
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  type-check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npm run type-check # should run `tsc --noEmit`

  build-check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]
        environment: [staging, production]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.environment }}
        run: npm run build -- --configuration=${{ matrix.environment }}

      - name: Upload source maps to Sentry (staging only)
        if: github.event_name == 'push' && matrix.environment == 'staging'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: itqan-3o
          SENTRY_PROJECT: cms-frontend-staging
        run: npx @sentry/cli sourcemaps upload --release="${{ github.sha }}-staging" dist/browser

      - name: Upload production dist artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' && matrix.environment == 'production'
        uses: actions/upload-artifact@v4
        with:
          name: dist-production
          path: dist/browser
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: [lint-and-test, type-check, build-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Record pre-release version
        id: pre_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Run semantic-release
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Record post-release version
        id: post_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Download production dist artifact
        if: steps.pre_version.outputs.version != steps.post_version.outputs.version
        uses: actions/download-artifact@v4
        with:
          name: dist-production
          path: dist/browser

      - name: Create Sentry release and upload sourcemaps
        if: steps.pre_version.outputs.version != steps.post_version.outputs.version
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: itqan-3o
          SENTRY_PROJECT: cms-frontend
        run: |
          VERSION="v${{ steps.post_version.outputs.version }}"
          npx @sentry/cli releases new "$VERSION"
          npx @sentry/cli sourcemaps upload --release="$VERSION" dist/browser
          npx @sentry/cli releases set-commits "$VERSION" --auto
          npx @sentry/cli releases finalize "$VERSION"
          npx @sentry/cli releases deploys new --release "$VERSION" -e production

      - name: Update GitHub Release with AI notes
        if: steps.pre_version.outputs.version != steps.post_version.outputs.version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AI_NOTES=$(cat /tmp/ai-release-notes.txt 2>/dev/null || echo "See commit history for details.")
          gh release edit "v${{ steps.post_version.outputs.version }}" --notes "$AI_NOTES"

      - name: Post release to Slack
        if: steps.pre_version.outputs.version != steps.post_version.outputs.version
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_DEPLOY_WEBHOOK not set, skipping"
            exit 0
          fi
          VERSION="v${{ steps.post_version.outputs.version }}"
          AI_NOTES=$(cat /tmp/ai-release-notes.txt 2>/dev/null | head -c 500)
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg version "$VERSION" \
              --arg notes "$AI_NOTES" \
              --arg repo "$GITHUB_REPOSITORY" \
              '{
                blocks: [{
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: (":rocket: *CMS Frontend " + $version + " Released*\n\n" + $notes + "\n\n<https://github.com/" + $repo + "/releases/tag/" + $version + "|View Release Notes>")
                  }
                }]
              }')"

  notify:
    runs-on: ubuntu-latest
    needs: [lint-and-test, type-check, build-check, release]
    if: always() && github.event_name == 'push'

    steps:
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          COMMIT_MSG_RAW: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          REF_NAME: ${{ github.ref_name }}
          BUILD_RESULT: ${{ needs.build-check.result }}
          LINT_RESULT: ${{ needs.lint-and-test.result }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "⚠️ SLACK_DEPLOY_WEBHOOK secret not set, skipping notification"
            exit 0
          fi

          COMMIT_MSG="${COMMIT_MSG_RAW:-unknown}"
          # Sanitize for JSON
          COMMIT_MSG=$(echo "$COMMIT_MSG" | head -1 | sed 's/[\"\\]/\\&/g')
          ACTOR_SAFE=$(echo "$ACTOR" | sed 's/[\"\\]/\\&/g')

          BRANCH="$REF_NAME"
          if [ "$BRANCH" = "master" ]; then
            ENV_LABEL="PRODUCTION"
            ENV_URL="https://cms.itqan.dev"
          else
            ENV_LABEL="STAGING"
            ENV_URL="https://staging.cms.itqan.dev"
          fi

          if [ "$BUILD_RESULT" = "success" ] && [ "$LINT_RESULT" = "success" ]; then
            EMOJI=":white_check_mark:"
            STATUS="Built & Deploying"
          else
            EMOJI=":x:"
            STATUS="Build Failed"
          fi

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"${EMOJI} *[${ENV_LABEL}] CMS Frontend ${STATUS}*\n\n:link: <${ENV_URL}|View Site>\n:seedling: Branch: \`${BRANCH}\`\n:package: Commit: \`${GITHUB_SHA::7}\`\n:memo: ${COMMIT_MSG}\n:bust_in_silhouette: By: ${ACTOR_SAFE}\"
                  }
                }
              ]
            }"
