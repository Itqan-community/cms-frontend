name: CI

on:
  pull_request:
    branches: [staging, master]
  push:
    branches: [staging, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting
        run: npm run format:check

      - name: Build project
        run: npm run build -- --configuration=production

      - name: Run tests
        run: npm run test -- --browsers=ChromeHeadless --watch=false --code-coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  type-check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npm run type-check # should run `tsc --noEmit`

  build-check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]
        environment: [staging, production]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.environment }}
        run: npm run build -- --configuration=${{ matrix.environment }}

      - name: Upload source maps to Sentry
        if: github.event_name == 'push'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: itqan-3o
          SENTRY_PROJECT: ${{ matrix.environment == 'production' && 'cms-frontend' || 'cms-frontend-staging' }}
        run: npx @sentry/cli sourcemaps upload --release="${{ github.sha }}-${{ matrix.environment }}" dist/browser

  notify:
    runs-on: ubuntu-latest
    needs: [lint-and-test, type-check, build-check]
    if: always() && github.event_name == 'push'

    steps:
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          COMMIT_MSG_RAW: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          REF_NAME: ${{ github.ref_name }}
          BUILD_RESULT: ${{ needs.build-check.result }}
          LINT_RESULT: ${{ needs.lint-and-test.result }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "⚠️ SLACK_DEPLOY_WEBHOOK secret not set, skipping notification"
            exit 0
          fi

          COMMIT_MSG="${COMMIT_MSG_RAW:-unknown}"
          # Sanitize for JSON
          COMMIT_MSG=$(echo "$COMMIT_MSG" | head -1 | sed 's/[\"\\]/\\&/g')
          ACTOR_SAFE=$(echo "$ACTOR" | sed 's/[\"\\]/\\&/g')

          BRANCH="$REF_NAME"
          if [ "$BRANCH" = "master" ]; then
            ENV_LABEL="PRODUCTION"
            ENV_URL="https://cms.itqan.dev"
          else
            ENV_LABEL="STAGING"
            ENV_URL="https://staging.cms.itqan.dev"
          fi

          if [ "$BUILD_RESULT" = "success" ] && [ "$LINT_RESULT" = "success" ]; then
            EMOJI=":white_check_mark:"
            STATUS="Built & Deploying"
          else
            EMOJI=":x:"
            STATUS="Build Failed"
          fi

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"${EMOJI} *[${ENV_LABEL}] CMS Frontend ${STATUS}*\n\n:link: <${ENV_URL}|View Site>\n:seedling: Branch: \`${BRANCH}\`\n:package: Commit: \`${GITHUB_SHA::7}\`\n:memo: ${COMMIT_MSG}\n:bust_in_silhouette: By: ${ACTOR_SAFE}\"
                  }
                }
              ]
            }"
