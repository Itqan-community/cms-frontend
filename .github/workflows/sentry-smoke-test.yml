name: Sentry Smoke Test
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Send Sentry test alert notification
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import urllib.request, urllib.error, json, os, sys

          token = os.environ["SENTRY_AUTH_TOKEN"]
          org = "itqan-3o"
          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}

          def get(url):
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.load(r), r.status
              except urllib.error.HTTPError as e:
                  return {"error": e.read().decode()}, e.code

          def post(url):
              req = urllib.request.Request(url, data=b"{}", headers=headers, method="POST")
              try:
                  with urllib.request.urlopen(req) as r:
                      return r.read().decode(), r.status
              except urllib.error.HTTPError as e:
                  return e.read().decode(), e.code

          # List projects
          projects, _ = get(f"https://sentry.io/api/0/organizations/{org}/projects/?limit=20")
          project_slugs = [p["slug"] for p in projects] if isinstance(projects, list) else []
          print(f"Projects: {project_slugs}")

          # Check token scopes
          token_info, _ = get("https://sentry.io/api/0/")
          print(f"Token scopes: {token_info.get('scopes', 'unknown')[:5] if isinstance(token_info, dict) else str(token_info)[:200]}")

          # Try project-level alert rules for each project
          sent = False
          for slug in project_slugs:
              rules, status = get(f"https://sentry.io/api/0/projects/{org}/{slug}/rules/?limit=25")
              if isinstance(rules, list) and rules:
                  print(f"Project {slug}: {len(rules)} issue alert rules")
                  # Find one targeting #incidents
                  for r in rules:
                      for action in r.get("actions", []):
                          if "incidents" in str(action).lower() or "channel_id" in str(action).lower():
                              print(f"Found incidents rule in {slug}: {r['name']} (id={r['id']})")
                              result, code = post(f"https://sentry.io/api/0/projects/{org}/{slug}/rules/{r['id']}/test/")
                              print(f"Test result HTTP {code}: {result[:200]}")
                              if code in (200, 201, 202, 204):
                                  print("SUCCESS: Sentry test notification sent to Slack")
                                  sent = True
                              break
                      if sent:
                          break
                  if sent:
                      break
              else:
                  print(f"Project {slug}: no rules (HTTP {status})")

          if not sent:
              # Try sending test with first rule found anywhere
              for slug in project_slugs:
                  rules, status = get(f"https://sentry.io/api/0/projects/{org}/{slug}/rules/?limit=25")
                  if isinstance(rules, list) and rules:
                      r = rules[0]
                      print(f"Fallback: testing first rule in {slug}: {r['name']}")
                      result, code = post(f"https://sentry.io/api/0/projects/{org}/{slug}/rules/{r['id']}/test/")
                      print(f"Test result HTTP {code}: {result[:200]}")
                      if code in (200, 201, 202, 204):
                          print("SUCCESS: Sentry test notification sent")
                          sent = True
                          break

          if not sent:
              print("ERROR: Could not send test notification - no accessible alert rules")
              sys.exit(1)

          print("DONE")
          PYEOF
