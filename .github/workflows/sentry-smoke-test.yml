name: Sentry Smoke Test (temp - delete after run)
on:
  workflow_dispatch:
jobs:
  sentry-alert-test:
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - name: List Sentry alert rules and send test notification
        run: |
          ORG=itqan-3o

          # List all metric alert rules
          RULES=$(curl -s -H "Authorization: Bearer $SENTRY_AUTH_TOKEN"             "https://sentry.io/api/0/organizations/$ORG/alert-rules/?limit=50" 2>/dev/null)

          echo "Alert rules: $RULES" | head -c 500

          # Find a rule pointing to #incidents
          RULE_ID=$(echo "$RULES" | python3 -c "
import json, sys
rules = json.load(sys.stdin)
for r in rules:
    actions = r.get("actions", [])
    for a in actions:
        if "incidents" in str(a).lower():
            print(r["id"])
            exit()
" 2>/dev/null || echo "")

          if [ -n "$RULE_ID" ]; then
            echo "Sending test notification for rule ID: $RULE_ID"
            RESULT=$(curl -s -X POST -H "Authorization: Bearer $SENTRY_AUTH_TOKEN"               -H "Content-Type: application/json"               "https://sentry.io/api/0/organizations/$ORG/alert-rules/$RULE_ID/test/" 2>/dev/null)
            echo "Test result: $RESULT"
          else
            # Fall back: get first alert rule and test it
            RULE_ID=$(echo "$RULES" | python3 -c "import json,sys; rules=json.load(sys.stdin); print(rules[0]["id"] if rules else "")" 2>/dev/null)
            if [ -n "$RULE_ID" ]; then
              echo "Sending test notification for first rule ID: $RULE_ID"
              RESULT=$(curl -s -X POST -H "Authorization: Bearer $SENTRY_AUTH_TOKEN"                 -H "Content-Type: application/json"                 "https://sentry.io/api/0/organizations/$ORG/alert-rules/$RULE_ID/test/" 2>/dev/null)
              echo "Test result: $RESULT"
            else
              echo "No alert rules found"
              exit 1
            fi
          fi
