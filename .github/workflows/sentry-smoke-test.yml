name: Sentry Smoke Test
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Send Sentry test alert notification
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import urllib.request, urllib.error, json, os, sys

          token = os.environ["SENTRY_AUTH_TOKEN"]
          org = "itqan-3o"
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
          }

          def get(url):
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.load(r), r.status
              except urllib.error.HTTPError as e:
                  return {"error": e.read().decode()}, e.code

          # Verify auth works
          data, status = get(f"https://sentry.io/api/0/organizations/{org}/")
          print(f"Org check HTTP {status}: {str(data)[:200]}")

          if status != 200:
              print("Auth failed or wrong org slug")
              sys.exit(1)

          # Try issue alert rules (more common)
          rules_data, rules_status = get(f"https://sentry.io/api/0/organizations/{org}/rules/?limit=50")
          issue_rules = rules_data if isinstance(rules_data, list) else []
          print(f"Issue alert rules: {len(issue_rules)} (HTTP {rules_status})")

          # Try metric alert rules
          metric_data, metric_status = get(f"https://sentry.io/api/0/organizations/{org}/alert-rules/?limit=50")
          metric_rules = metric_data if isinstance(metric_data, list) else []
          print(f"Metric alert rules: {len(metric_rules)} (HTTP {metric_status})")

          # Find a rule pointing to #incidents
          target_rule = None
          target_type = None

          for r in issue_rules:
              for action in r.get("actions", []):
                  if "incidents" in str(action).lower():
                      target_rule = r
                      target_type = "issue"
                      break
              if target_rule:
                  break

          if not target_rule:
              for r in metric_rules:
                  for action in r.get("actions", []):
                      if "incidents" in str(action).lower():
                          target_rule = r
                          target_type = "metric"
                          break
                  if target_rule:
                      break

          # Fall back to first available rule
          if not target_rule:
              if issue_rules:
                  target_rule = issue_rules[0]
                  target_type = "issue"
              elif metric_rules:
                  target_rule = metric_rules[0]
                  target_type = "metric"

          if not target_rule:
              print("No alert rules found in org")
              sys.exit(1)

          print(f"Selected {target_type} rule: {target_rule['name']} (id={target_rule['id']})")

          # Send test notification
          if target_type == "metric":
              url = f"https://sentry.io/api/0/organizations/{org}/alert-rules/{target_rule['id']}/test/"
          else:
              url = f"https://sentry.io/api/0/organizations/{org}/rules/{target_rule['id']}/test/"

          req2 = urllib.request.Request(url, data=b"{}", headers=headers, method="POST")
          try:
              with urllib.request.urlopen(req2) as resp2:
                  result = resp2.read()
                  print(f"SUCCESS: test notification sent: {result}")
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"HTTP {e.code}: {body}")
              if e.code not in (200, 201, 202, 204):
                  sys.exit(1)
              else:
                  print("SUCCESS: test notification accepted")

          print("DONE")
          PYEOF
